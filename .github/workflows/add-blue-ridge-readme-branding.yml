name: Add Blue Ridge README branding

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  brand-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add branding assets and README badges
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tmp="$(mktemp -d)"
          git clone --depth 1 https://github.com/owensreo/blue-ridge-windows-maintenance.git "$tmp/source"

          mkdir -p assets
          cp "$tmp/source/assets/blue-ridge-systems-consulting-logo.svg" assets/blue-ridge-systems-consulting-logo.svg
          cp "$tmp/source/BRANDING.md" BRANDING.md

          if [ ! -f README.md ]; then
            printf '# raspberry-pi-5\n' > README.md
          fi

          python3 <<'PY'
          from pathlib import Path
          p = Path('README.md')
          text = p.read_text()

          logo = '<p align="center">\n  <img src="assets/blue-ridge-systems-consulting-logo.svg" alt="Blue Ridge Systems Consulting Logo" width="160" />\n</p>\n\n'
          if 'assets/blue-ridge-systems-consulting-logo.svg' not in text[:700]:
              text = logo + text.lstrip()

          if '## Branding' not in text and 'BRANDING.md' not in text:
              branding = '\n\n## Branding\n\nThis repository includes Blue Ridge Systems Consulting branding assets. See [`BRANDING.md`](BRANDING.md) for logo and brand usage guidance.\n'
              text = text.rstrip() + branding

          aikido_url = 'https://app.aikido.dev/audit-report/external/WUuAYeTGe5MdKOz7TJTyBMJl/request'
          aikido = '''\n\n---\n\n## Security Audit\n\n<a href="https://app.aikido.dev/audit-report/external/WUuAYeTGe5MdKOz7TJTyBMJl/request" target="_blank">\n    <img src="https://app.aikido.dev/assets/badges/full-light-theme.svg" alt="Aikido Security Audit Report" height="40" />    \n</a>\n'''
          if aikido_url not in text:
              text = text.rstrip() + aikido

          p.write_text(text)
          PY

          rm -f .github/workflows/add-blue-ridge-readme-branding.yml
          git add -A
          if git diff --cached --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git commit -m "Add Blue Ridge README branding"
          git push
