name: Copy LMD scripts from chatgpt-scripts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  copy-lmd-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout raspberry-pi-5
        uses: actions/checkout@v4
        with:
          path: target
          fetch-depth: 0

      - name: Checkout chatgpt-scripts source
        uses: actions/checkout@v4
        with:
          repository: owensreo/chatgpt-scripts
          path: source
          fetch-depth: 1

      - name: Copy scripts and commit
        run: |
          set -euo pipefail
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cp ../source/install-br-lite-malware-scan.sh ./install-br-lite-malware-scan.sh
          cp ../source/uninstall-br-lite-malware-scan.sh ./uninstall-br-lite-malware-scan.sh
          chmod +x ./install-br-lite-malware-scan.sh ./uninstall-br-lite-malware-scan.sh

          rm -f .github/workflows/copy-lmd-scripts-from-chatgpt-scripts.yml

          git add -A
          if git diff --cached --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git commit -m "Copy lightweight malware scan scripts"
          git push
